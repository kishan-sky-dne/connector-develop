type: object
properties:
  status:
    type: "string"
    example: "UNSUCCESSFUL"
    enum:
      - SUCCESSFUL,
      - UNSUCCESSFUL
  ticketNumber:
    type: string
    example: "CHG123456789"
  startDate:
    type: string
    example: "1572794340"
  endDate:
    type: string
    example: "1572794340"
  templateName:
    type: string
    example: "UK: IPND - STD2371 - CORE Plug-up and Circuit test (IP T&D)"
  attachmentError:
    type: array
    items:
      type: object
      properties:
        fileName:
          type: string
          example: "abc.xls"
        errorMessage:
          type: string
          example: ""
  ciAddError:
      type: array
      items:
        type: object
        properties:
          ciName:
            type: string
            example: "ma0.test.bllab.it.bb.sky.com"
          errorMessage:
            type: string
            example: ""
required:
  - status