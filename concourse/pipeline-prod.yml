  DOCKERCONFIGJSON: ((common-creds.dockerconfigjson))

jobs:
  - name: gitleaks-scan
    public: true
    plan:
      - get: repo-prod
        trigger: true
      - task: run-gitleaks
        file: repo-prod/concourse/tasks/gitleaks.yml
        input_mapping: {repo: repo-prod}

  - name: build-docker
    public: true
    serial: true
    plan:
      - get: repo-prod
        trigger: true
        passed: [gitleaks-scan]
      - task: build-and-push
        privileged: true
        file: repo-prod/concourse/tasks/build-docker.yml
        input_mapping: {repo: repo-prod}
        params:
          HARBOR_USERNAME: ((common-creds.harbor_username))
          HARBOR_PASSWORD: ((common-creds.harbor_password))
          HARBOR_REGISTRY: ((common-creds.harbor_registry))
          IMAGE_NAME: ipnd-dne/connectors
          IMAGE_TAG: latest

  - name: deploy-cks-onx
    public: true
    plan:
      - get: repo-prod
        trigger: false
        passed: [build-docker]
      - task: deploy-to-cks-onx
        file: repo-prod/concourse/tasks/deploy-cks.yml
        input_mapping: {repo: repo-prod}
        params:
          <<: *params-prod-cks-deploy-base
          DATACENTER: onx
          KUBECONFIG_CONTENT: ((prod-onx-kubeconfig))

  - name: deploy-cks-sce
    public: true
    plan:
      - get: repo-prod
        trigger: false
        passed: [build-docker]
      - task: deploy-to-cks-sce
        file: repo-prod/concourse/tasks/deploy-cks.yml
        input_mapping: {repo: repo-prod}
        params:
          <<: *params-prod-cks-deploy-base
          DATACENTER: sce
          KUBECONFIG_CONTENT: ((prod-sce-kubeconfig))
