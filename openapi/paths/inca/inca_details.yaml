get:
  tags:
    - inca
  summary: Retrieve different type of INCA circuit details
  description: Get meta data of the different type of Circuit from INCA Inventory
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.inca.tasks.read"
  operationId: get_inca_details
  parameters:
    - name: 'type'
      in: query
      required: true
      description: type of the circuit
      schema:
        type: string
        example: gea
        enum:
          - gea
    - name: 'state'
      in: query
      required: false
      description: state of the circuit
      schema:
        type: string
        example: config-ready/None
        enum:
          - config-ready
          - plugup-ready
          - cease-requested
          - None
    - name: 'limit'
      in: query
      required: false
      description: Maximum number of required record
      schema:
        type: integer
        example: 50
        default: 50
        minimum: 1
        maximum: 100
    - name: cablelinkRef
      in: query
      description: Cable link reference
      required: false
      schema:
        pattern: ^OGHP[0-9]+
        example: "OGHP65628896"
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/inca/response/getIncaDetails.yaml'
      description: Expected response of inca module for /getIncaDetails call
patch:
  tags:
    - inca
  summary: Update the status of multiple INCA circuit for given type
  description: Update status of the different type of Circuit from INCA Inventory
  security:
    - oAuth2ClientCredentials: [connector:write]
  x-openapi-router-controller: "connectors.webserver.inca.tasks.update"
  operationId: update_inca_details
  parameters:
    - name: 'type'
      in: query
      required: true
      description: type of the circuit
      schema:
        type: string
        example: gea
        enum:
          - gea
  requestBody:
    description: Required details to update INCA status
    content:
      application/json:
        schema:
          $ref: '../../definitions/inca/request/updateIncaDetails.yaml'
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/inca/response/updateIncaDetails.yaml'
      description: Expected response of inca module for /updateIncaDetails call
post:
  tags:
    - inca
  summary: Cease a existing GEA circuit from INCA Inventory
  description: API is used to cease a existing GEA circuit from INCA Inventory
  security:
    - oAuth2ClientCredentials: [ connector:write ]
  x-openapi-router-controller: "connectors.webserver.inca.tasks.write"
  operationId: write_inca_details
  parameters:
    - name: requestType
      in: query
      required: true
      description: Specifies the circuit request type. Currently only cease is supported
      schema:
        type: string
        enum:
          - cease
    - name: type
      in: query
      required: true
      description: Specifies type of the service
      schema:
        type: string
        enum:
          - gea
  requestBody:
    description: Required details to update INCA status
    content:
      application/json:
        schema:
          $ref: '../../definitions/inca/request/ceaseCircuit.yaml'
  responses:
    '200':
      description: Expected response of inca module for /ceaseCircuit.yaml call
      content:
        application/json:
          schema:
            $ref: '../../definitions/inca/response/ceaseCircuit.yaml'