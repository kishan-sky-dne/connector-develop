type: object
properties:
  ipaddr:
    type: string
    example: 10.42.250.162
  snmp_sysdescr:
    type: string
    example: Huawei Integrated Access Software
  location:
    type: string
    example: MC3_brick_lane
  owner:
    type: string
    example: MD_IPAccess
  status:
    type: string
    example: development
  vendor:
    type: string
    example: huawei
  hostname:
    type: string
    example: olt2.test.bllab.it.bb.sky.com
  device_type:
    type: string
    example: HuaweiOLT
  admin_group:
    type: string
    example: Italia_SP
  model:
    example: NCS-5500
    type: string
  model_family:
    example: null
    type: string
  os:
    example: ios-xr
    type: string
  os_version:
    example: 6.5.3
    type: string
required:
  - ipaddr
  - model
  - os
  - os_version
