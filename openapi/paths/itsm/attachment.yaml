patch:
  tags:
    - itsm
  summary: Add/Remove attachment to SPARK ticket into ServiceNow
  description: requests to spark to add/remove attachment
  x-openapi-router-controller: "connectors.webserver.itsm.tasks.ticketAttachmentUpload"
  security:
    - oAuth2ClientCredentials: [connector:write]
  operationId: attachment_upload
  requestBody:
    description: Required details to add/remove attachment to the ticket
    content:
      'multipart/form-data':
        schema:
          $ref: '../../definitions/itsm/request/attachment_upload.yaml'
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/itsm/response/attachment_upload.yaml'
      description: Expected response from Spark
get:
  tags:
    - itsm
  summary: List attachment to SPARK ticket into ServiceNow
  description: requests to spark to list attachment for the ticket
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.itsm.tasks.ticketAttachmentList"
  operationId: attachment_list
  parameters:
    - name: 'ticketNumber'
      in: query
      required: true
      description: 'Change ticket'
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/itsm/response/attachment_list.yaml'
      description: Expected response from Spark