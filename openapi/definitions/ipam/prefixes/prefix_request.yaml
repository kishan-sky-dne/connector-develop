required:
  - prefix
properties:
  prefix:
    type: string
    example: 90.223.217.170/32
    pattern: '^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)([\/]([1-9]|[12][0-9]|3[0-2]))?$'
  site:
    type: string
    minLength: 1
    example: BLLON
  vrf:
    type: string
    minLength: 1
    maxLength: 20
    example: Global
  tenant:
    type: string
    minLength: 1
    example: UK-Core
  role:
    type: string
    minLength: 1
    example: Core-Interconnect
  is_pool:
    type: boolean
    default: false
  description:
    type: string
    minLength: 1
    example: hostname(Loopback)
  tags:
    type: array
    minItems: 1
    items:
      type: string
    example: interconnect
  custom_fields:
    type: object