get:
  tags:
    - dcs
  summary: Retrieve all supported vendors from DCS
  description: Returns a list of all current vendors in the DCS system
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.dcs.tasks.read"
  operationId: get_all_device_vendors
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/dcs/response/get_supported_vendors.yaml'
      description: Expected response of dcs module all current vendors