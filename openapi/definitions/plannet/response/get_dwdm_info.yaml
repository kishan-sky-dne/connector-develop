type: array
items:
  type: object
  properties: 
    channel_number: 
      type: "number"
      example: 60
    frequency: 
      type: "number"
      example: 196
    id: 
      type: "number"
      example: 36
    interface: 
      type: "string"
      example: "C1"
    ne_type: 
      type: "string"
      example: "16CSM-SFA"
    wavelength: 
      type: "number"
      example: 1529.55
