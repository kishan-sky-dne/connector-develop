---
#============================================================
# Connectors - Production Environment Pipeline
# Manual trigger for production deployment
#============================================================

resources:
  - name: repo-prod
    type: git
    icon: github
    check_every: 1m
    webhook_token: &webhook-token ((common-creds.webhook_token))
    source: &git-source
      uri: https://github.com/sky-uk/dne-connectors.git
      username: ((common-creds.github_username))
      password: ((common-creds.github_personal_access_token))
      branch: master

groups:
  - name: all
    jobs:
      - gitleaks-scan
      - build-docker
      - deploy-cks-onx
      - deploy-cks-sce

x-params-prod-cks-deploy-base: &params-prod-cks-deploy-base
