type: object
properties:    
  keyId:
    type: string
    minLength: 1
    example: "BPM-12345"
  message:
    type: object
    properties:
      orderNumber:
        type: integer
        example: 12345
      orderType:
        type: string
        minLength: 1
        example: "map-t"
      orderCreateDate:
        type: string
        minLength: 1
        example: "2022-07-25 12:04:59"
      orderEndDate:
        type: string
        minLength: 1
        example: "2022-07-25 12:04:59"
      status:
        type: string
        minLength: 1
        example: Success 
      serviceStatusDetails:
        type: object
        example: {/*Use case specific */}
  eventTime:
    type: string
    minLength: 1
    example: "2022-07-25 12:04:59"
  eventSource:
    type: string
    minLength: 1
    example: "DNE-BPM"