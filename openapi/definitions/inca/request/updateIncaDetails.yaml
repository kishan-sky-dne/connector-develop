type: object

properties:
  circuitDetails:
    type: array
    minItems: 1
    items:
      properties:
        circuitId:
          type: string
          minLength: 4
          example: "OGHP65628896"
          pattern: ^OGHP
        configStatus:
          type: string
          enum:
            - inprogress
            - success
            - failure
          minLength: 1
        sparkReference:
          type: string
          example: CHG12345678
          minLength: 4
          pattern: ^(CTASK|CHG)[0-9]+$
        configDate:
          type: string
          example: "11/5/2021"
        circuitState:
          type: string
          enum:
            - Ready-For-Config
            - Ready-For-Service
            - GEA-CEASE
        testRef:
          type: string
          minLength: 1
        comments:
          type: string
          maxLength: 200
          minLength: 1
        orderRef:
          minLength: 1
          type: string
        circuitCeaseOrderRef:
          minLength: 1
          type: string
        configCeaseDate:
          type: string
          example: 01/01/2024
          pattern: ^(?:0[1-9]|[12]\d|3[01])\/(?:0[1-9]|1[0-2])\/(?:2\d{3})$
        orCeaseDate:
          type: string
          example: 01/01/2024
          pattern: ^(?:0[1-9]|[12]\d|3[01])\/(?:0[1-9]|1[0-2])\/(?:2\d{3})$
        ceaseSubmittedDate:
          type: string
          example: 01/01/2024
          pattern: ^(?:0[1-9]|[12]\d|3[01])\/(?:0[1-9]|1[0-2])\/(?:2\d{3})$
        orCeaseRef:
          type: string
          maxLength: 50
          minLength: 1
      required:
      - circuitId
      - configStatus
required:
- circuitDetails