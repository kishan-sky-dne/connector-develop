required:
  - status
properties:
  status:
    type: string
    example: failure
    enum:
      - success
      - failure
  errorCategory:
    type: string
    example: FAILED
    enum:
      - FAILED
      - RETRY
  errors:
    type: array
    items:
      type: object
      properties:
        code:
          type: string
          example: ERR-006-999-0009
        message:
          type: string
          example: 'Delete Prefix: ID not found'
