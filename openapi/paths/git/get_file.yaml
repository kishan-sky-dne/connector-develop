get:
  tags:
    - git
  summary: Get file details from git
  description: Retrieves the details of a file from the git repository
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.git.tasks.read"
  operationId: get_file
  parameters:
    - name: 'filePath'
      in: query
      required: true
      description: details of path to file
      example: .sourcery.yaml
      schema:
        type: string
    - name: 'projectId'
      in: query
      required: true
      description: ID for project file
      example: 625
      schema:
        type: integer
  responses:
      '200':
        description: OK
        content:
          text/plain:
            schema:
              type: string
              example: Hello world