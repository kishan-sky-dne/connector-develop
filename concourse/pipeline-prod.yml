  CONNECTORS_RADIUS_USERNAME: ((prod-connectors.CONNECTORS_RADIUS_USERNAME))
  CONNECTORS_RSA_PRIVATE_KEY: ((prod-connectors.CONNECTORS_RSA_PRIVATE_KEY))
  CONNECTORS_RSA_PUBLIC_KEY: ((prod-connectors.CONNECTORS_RSA_PUBLIC_KEY))
  CONNECTORS_SERVICEDB_PASSWORD: ((prod-connectors.CONNECTORS_SERVICEDB_PASSWORD))
  CONNECTORS_SERVICEDB_USERNAME: ((prod-connectors.CONNECTORS_SERVICEDB_USERNAME))
