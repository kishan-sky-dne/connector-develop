post:
  tags:
    - AuditNow
  summary: Starts AuditNow service
  description: Starts AuditNow service in a new thread
  security:
      - oAuth2ClientCredentials:
        - connector:write
  x-openapi-router-controller: "connectors.webserver.audit_now.audit_now"
  operationId: start_audit_now
  responses:
    '200':
      content:
        application/json:
          schema:
            type: object
            properties:
              info:
                type: string
                example: "request for starting AuditNow accepted"
      description: Expected response for stop AuditNow call