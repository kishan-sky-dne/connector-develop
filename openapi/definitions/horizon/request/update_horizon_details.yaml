---
  required:
    - status
  properties: 
    status: 
      type: "string"
      enum:
        - "Initial"
        - "Requested"
        - "In Progress"
        - "Complete"
        - "Aborted"
        - "Failed"
    completion_date:
      type: "string"
      pattern: ^[0-9]{4}\-(0[1-9]|1[012])\-(0[1-9]|[12][0-9]|3[01])$
    estimated_completion_date: 
      type: "string"
      pattern: ^[0-9]{4}\-(0[1-9]|1[012])\-(0[1-9]|[12][0-9]|3[01])$
    original_required_by_date: 
      type: "string"
      pattern: ^[0-9]{4}\-(0[1-9]|1[012])\-(0[1-9]|[12][0-9]|3[01])$
    unique_reference:
      type: "string"
      pattern: ^TG[0-9]+$
