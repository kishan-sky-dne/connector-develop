post:
  tags:
    - mailer
  summary: Responsible for sending email notifications to users
  description: Sends email to the list of ids with the given template
  security:
    - oAuth2ClientCredentials: [connector:write]
  x-openapi-router-controller: "connectors.webserver.mailer.tasks.sender"
  operationId: email_notifications
  requestBody:
    description: Required details to send mails
    content:
      'application/json':
        schema:
          $ref: '../../definitions/mailer/request.yaml'
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/mailer/response.yaml'
      description: Expected response from Connector