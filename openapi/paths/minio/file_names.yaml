get:
  tags:
    - MinIO
  description: Get filenames from MinIO Storage
  x-openapi-router-controller: "connectors.webserver.minio.read"
  security:
    - oAuth2ClientCredentials: [connector:read]
  operationId: get_file_names
  parameters:
    - name: 'bucketName'
      in: query
      required: true
      description: Name of the bucket from where files will be present in folder 
      example: software-update
      schema:
        type: string
        minLength: 3
        maxLength: 63
        pattern: '^(?!^(?:\d{1,3}\.){3}\d{1,3}$)[a-z0-9]([a-z0-9\-]{1,61}[a-z0-9])?$'
    - name: 'orderId'
      in: query
      required: true
      description: orderId is folder in MinIO where files are located
      example: BPM-123
      schema:
        type: string
        minLength: 1
        maxLength: 250
  responses:
    '200':
      description: File names from MinIO storage
      content:
        application/json:
          schema:
            $ref: '../../definitions/minio/fileNamesResponse.yaml'
    '400':
      description: Bad Request
    '401':
      description: Unauthorized
    '500':
      description: Internal Server Error