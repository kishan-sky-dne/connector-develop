type: object
properties:
  ipaddr:
    type: string
    example: 10.42.250.162
  snmp_sysdescr:
    type: string
    example: Huawei Integrated Access Software
  location:
    type: string
    example: MC3_brick_lane
  owner:
    type: string
    example: MD_IPAccess
  status:
    type: string
    example: development
  vendor:
    type: string
    example: huawei
  hostname:
    type: string
    example: olt2.test.bllab.it.bb.sky.com
  device_type:
    type: string
    example: HuaweiOLT
  admin_group:
    type: string
    example: Italia_SP
  model:
    example: NCS-5500
    type: string
  os:
    example: ios-xr
    type: string
  os_version:
    example: 6.5.3
    type: string
  known_issue:
    type: string
  tacacs_group:
    example: IP_OVN_MRV
    type: string
  access:
    type: string
  ports:
    type: array
    items:
      type: object
      properties:
        enabled:
          type: integer
          example: 1
        name:
          type: integer
          example: 2
        descr:
          type: string
          example: free
  collection:
    type: object
    properties:
      errors:
        type: array
      collector:
        type: string
        example: dis-col01.nme.enslo.sns.sky.com
      datetime:
        type: string
        example: 2023-04-20T08:25:32Z
      detail:
        type: array
        items:
          type: object
          properties:
            time:
              type: integer
              example: 1
            name:
              type: string
              example: Resolver
            descr:
              type: string
              example: Resolve cm0.cmbrau.isp.sky.com to 90.222.227.117
            error:
              type: string
      issues:
        type: object
        properties:
          error:
            type: object
  config:
    type: object
    properties:
      id:
        type: string
        example: eac93339c0a48818c4c5460f52a29f2eb4d293e3
      size:
        type: integer
        example: 9037
      datetime:
        type: string
        example: 2020-07-10T01:47:58Z
required:
  - ipaddr
  - model
  - os
  - os_version
