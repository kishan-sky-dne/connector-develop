type: object
properties:
  status:
    type: string
    example: "Success|Failed|Partial Success"
  message:
    type: string
    example: "Success or Failed or Partial Success message"
  targetEmailsStatus:
    type: object
    properties:
      toList:
        type: object
        properties:
          successEmails:
            type: array
            items:
              type: string
              format: email
          failedEmails:
            type: array
            items:
              type: string
              format: email
      ccList:
        type: object
        properties:
          successEmails:
            type: array
            items:
              type: string
              format: email
          failedEmails:
            type: array
            items:
              type: string
              format: email
      bccList:
        type: object
        properties:
          successEmails:
            type: array
            items:
              type: string
              format: email
          failedEmails:
            type: array
            items:
              type: string
              format: email
  attachmentStatus:
    type: string
    example: "Success|None"