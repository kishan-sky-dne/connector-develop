patch:
  tags:
    - inca
  summary: update given type of wholesale request in INCA circuit inventory
  description: This API is used to update the Wholesale request for service type uni,interconnect or partner in INCA.
               A Wholesale request can be new, cease or update.
  security:
    - oAuth2ClientCredentials: [connector:write]
  x-openapi-router-controller: "connectors.webserver.inca.tasks.update"
  operationId: update_wholesale_details
  parameters:
    - name: 'requestType'
      in: query
      required: true
      description: Specifies the Wholesale request type. Can be one of the following - new, update, cease
      schema:
        type: string
        enum:
          - new
          - update
          - cease
    - name: 'serviceType'
      in: query
      required: true
      description: Specifies the Wholesale service type. Can be one of the following - uni, interconnect, partner
      schema:
        type: string
        enum:
          - uni
          - interconnect
          - partner
  requestBody:
    description: Request body to update wholesale details.
    required: true
    content:
      application/json:
        schema:
          type: object
  responses:
    '200':
      description: "Response details to update wholesale status."
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: SUCCESS