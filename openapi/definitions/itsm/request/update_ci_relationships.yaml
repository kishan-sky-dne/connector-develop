type: object
properties:
  ciRelationships:
    items:
      properties:
        serviceType:
          example: ubbLogical
          type: string
          default: raw
          enum:
            - raw
            - ubbLogical
            - ubbLogicalMigrations
            - skyTalk
            - metroLogicalLink
            - skyTalkMigrations
            - unifiedManagement
            - unifiedManagementMigrations
            - wholesale
            - wholesale-NNI
            - wholesaleMigrations
            - metroLogicalLinkMigrations
        ciLookupType:
          example: name
          type: string
          enum:
             - name
             - sys_id
             - service_ci_id
        action:
          example: add
          type: string
          enum:
             - add
             - remove
        parentCI:
          example: "me0.mypon.isp.sky.com"
          type: string
          minLength: 1
        relationshipType:
          example: Depends on::Used by
          type: string
          default: "Depends on::Used by"
          enum:
             - "Connects to::Connected by"
             - "Depends on::Used by"
        childCI:
          example: "ONEA45266093"
          type: string
          minLength: 1
      type: object
      required:
        - action
        - parentCI
        - childCI
    maxItems: 200
    minItems: 1
    type: array
required:
  - ciRelationships