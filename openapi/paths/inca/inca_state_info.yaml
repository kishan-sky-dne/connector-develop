get:
  tags:
    - inca
  summary: Retrieve given type of circuit update status from INCA circuit inventory
  description: Get the current status of the different type of Circuit INCA Inventory
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.inca.tasks.read"
  operationId: get_inca_status
  parameters:
    - name: 'job-id'
      in: path
      required: true
      description: job Id for getting the status
      schema:
        type: string
        example: "GC-4379"
        pattern: '(GC|BU)-[0-9]{4}'
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/inca/response/getIncaStatus.yaml'
      description: Expected response of inca module for /getIncaStatus call