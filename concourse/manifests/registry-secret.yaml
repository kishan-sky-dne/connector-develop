---
# Container Registry Credentials
# Template using envsubst - variables resolved by Concourse pipeline
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: ${NAMESPACE}
  labels:
    app: connectors
    environment: ${ENVIRONMENT}
    managed-by: concourse
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: ${DOCKERCONFIGJSON}
