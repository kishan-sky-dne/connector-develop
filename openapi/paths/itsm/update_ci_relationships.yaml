patch:
  tags:
    - itsm
  summary: Update CI relationships in Spark
  description: request to Spark to update CI relationships
  security:
    - oAuth2ClientCredentials: [connector:write]
  x-openapi-router-controller: "connectors.webserver.itsm.tasks.ciRelationshipUpdater"
  operationId: update_ci_relationships
  parameters:
    - name: table
      in: query
      required: false
      description: valid cmdb table
      schema:
        type: string
        example: cmdb_ci
        default: cmdb_ci
        enum:
          - cmdb_ci
  requestBody:
    description: CIs and relationship between CIs to update
    content:
      'application/json':
        schema:
          $ref: '../../definitions/itsm/request/update_ci_relationships.yaml'
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/itsm/response/update_ci_relationships.yaml'
      description: Expected response from Spark
