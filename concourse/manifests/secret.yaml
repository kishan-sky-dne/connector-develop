---
# Connectors Application Secrets
# Template using envsubst - variables resolved by Concourse pipeline
apiVersion: v1
kind: Secret
metadata:
  name: connectors-secrets
  namespace: ${NAMESPACE}
  labels:
    app: connectors
    environment: ${ENVIRONMENT}
    managed-by: concourse
type: Opaque
stringData:
  # OAuth credentials
  oauth_username: "${OAUTH_USERNAME}"
  oauth_password: "${OAUTH_PASSWORD}"
  
  # Sky Vault credentials
  sky_vault_app_id: "${SKY_VAULT_APP_ID}"
  sky_vault_cdn_rs_safe: "${SKY_VAULT_CDN_RS_SAFE}"
  
  # CAuth credentials
  cauth_username: "${CAUTH_USERNAME}"
  cauth_password: "${CAUTH_PASSWORD}"
  
  # Active Directory credentials
  ad_username: "${AD_USERNAME}"
  ad_password: "${AD_PASSWORD}"
  
  # ITSM credentials
  itsm_subscription_key: "${ITSM_SUBSCRIPTION_KEY}"
  
  # Plannet credentials
  plannet_username: "${PLANNET_USERNAME}"
  plannet_password: "${PLANNET_PASSWORD}"
  
  # INCA credentials
  inca_username: "${INCA_USERNAME}"
  inca_password: "${INCA_PASSWORD}"
  
  # Nexa credentials
  nexa_username: "${NEXA_USERNAME}"
  nexa_password: "${NEXA_PASSWORD}"
  
  # Note: RSA keys are created separately in pipeline due to multi line content

