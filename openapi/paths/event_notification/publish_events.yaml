post:
  tags:
    - Event Notification
  summary: DNE connector services for publishing the events for the DNE order status
  description: Publish Order Status to Kafka
  security:
    - oAuth2ClientCredentials: [ connector:write ]
  x-openapi-router-controller: "connectors.webserver.event_notification.publish_events"
  operationId: publish_order_status
  requestBody:
    description: Required details to publish order status
    content:
      'application/json':
        schema:
          $ref: '../../definitions/event_notification/request.yaml'
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/event_notification/success_response.yaml'
      description: Expected success response of publish-order-status 
    '400':
      content:
        application/json:
          schema:
            $ref: '../../definitions/event_notification/failure_response.yaml'
      description: Expected failure response of publish-order-status 


