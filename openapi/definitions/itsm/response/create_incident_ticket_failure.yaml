properties:
  status:
    type: string
    example: FAILURE 
  errorCategory:
    type: string
    example: FAILED 
  errors:
    type: array
    items:
      type: object
      properties:
        code:
          type: string
          example: "ERR-003-999-0001"
        message:
          type: string
          example: "<error message>"