required:
   - status
properties:
   status:
     type: string
     example: failure
     enum :
       - SUCCESS
       - FAILURE
       - PARTIAL-SUCCESS
   errorCategory:
     type: "string"
     enum:
       - FAILED
       - RETRY
     example: "FAILED"
   errors:
     type: array
     items:
       type: object
       properties:
         code:
           type: string
           example: "ERR-000-009-0001"
         message:
           type: string
           example: "Failure in Database Operation"
   metadata:
     type: object
     properties:
       success:
         type: array
         items:
           type: object
           properties:
             image:
               type: object
               properties:
                 deviceVendor:
                   type: string
                 deviceModel:
                   type: string
                 region:
                   type: string
                 osVersion:
                   type: string
                 osLabel:
                   type: string
                 osStatus:
                   type: string
             osVersionDeviceRegionId:
               type: string
         properties:
           id:
             type: string
           type:
             type: string
       failure:
         type: array
         items:
           type: object
           properties:
             image:
               type: object
               properties:
                 deviceVendor:
                   type: string
                 deviceModel:
                   type: string
                 region:
                   type: string
                 osVersion:
                   type: string
                 osLabel:
                   type: string
                 osStatus:
                   type: string