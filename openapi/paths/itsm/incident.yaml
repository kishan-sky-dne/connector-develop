post:
  tags:
    - itsm
  summary: Creates an incident ticket
  description: Incident ticket generation request through CAG in SPARK
  security:
    - oAuth2ClientCredentials: [connector:write]
  x-openapi-router-controller: "connectors.webserver.itsm.tasks.incidentTicketGenerator"
  operationId: create_incident_ticket
  requestBody:
    description: Required details to create the incident ticket
    content:
      'application/json':
        schema:
          $ref: '../../definitions/itsm/request/create_incident_ticket.yaml'
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/itsm/response/create_incident_ticket_success.yaml'
      description: Expected success response from incident ticket generator API
    '400':
      content:
        application/json:
          schema:
            $ref: '../../definitions/itsm/response/create_incident_ticket_failure.yaml'
      description: Expected failure response from incident ticket generator API