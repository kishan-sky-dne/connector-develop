get:
  tags:
    - AuditNow
  summary: Check AuditNow Thread Status
  description: Checks AuditNow Thread Status
  security:
      - oAuth2ClientCredentials:
        - connector:read
  x-openapi-router-controller: "connectors.webserver.audit_now.audit_now"
  operationId: audit_now_status
  responses:
    '200':
      content:
        application/json:
          schema:
            type: object
            properties:
              info:
                type: string
                example: "AuditNow is running"
      description: Expected response for AuditNow status 