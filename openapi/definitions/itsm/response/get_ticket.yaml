type: object
properties:
  result:
    type: array
    items:
      type: object
      properties:
        chgtktNumber:
          type: string
          example: "CHG123456789"
        state:
          type: string
          example: "APPROVED"
        startDate:
          type: string
          example: "1572794340"
        endDate:
          type: string
          example: "1572794340"
        parentTicketNumber:
          type: string
          example: "CHG12345678"
          description: "parentTicket will be in response if parentChange is set to True in query parameter"