type: object
properties:
  operation:
    type: string
    example: add/remove
    enum:
      - add
      - remove
  ticketNumber:
    type: string
    example: CTASK0002134
  fileName:
    type: string
    example: precheck.txt
    pattern: '^[\w-]{3,100}\.(txt|log|xls|doc|docx|zip)$'     #  Fix for Bug DNE-2593
  attachment:
    type: string
    format: base64
required:
  - ticketNumber
  - operation
  - fileName
