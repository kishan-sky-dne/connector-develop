  /fileHandler:
    post:
      description: The API write the xls/csv file as per provided data
      operationId: write_sheet
      requestBody:
        content:
          application/json:
            schema:
              properties:
                fileType:
                  enum:
                  - xls
                  - csv
                  type: string
                sheets:
                  items:
                    properties:
                      sections:
                        items:
                          properties:
                            rows:
                              items:
                                type: object
                              minItems: 1
                              type: array
                          required:
                          - rows
                          type: object
                        minItems: 1
                        type: array
                    required:
                    - sections
                    type: object
                  minItems: 1
                  type: array
                templateName:
                  default: abc.xls
                  example: abc.xls
                  pattern: ^.*$
                  type: string
              required:
              - templateName
              - sheets
              - fileType
              type: object
        description: Request to write the xls/csv file as per provided data
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  fileContent:
                    pattern: ^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=|[A-Za-z0-9+/]{4})$
                    type: string
                  fileName:
                    pattern: ^.*$
                    type: string
                required:
                - fileName
                - fileContent
                type: object
          description: Expected response as base64 encode string data
      security:
      - oAuth2ClientCredentials:
        - connector:write
      summary: The API write the xls/csv file as per provided data. Data is written
        on, already stored formated xls/csv file based on the rule described in template
        file.
      tags:
      - File Handler
      x-openapi-router-controller: connectors.webserver.filehandler.readwrite
    put:
      description: The API parse the xls/csv file data as per provided template file
        and returns the data in JSON formatted.
      operationId: parse_sheet
      requestBody:
        content:
          application/json:
            schema:
              properties:
                dataOrientation:
                  enum:
                  - col
                  - row
                  type: string
                fileContent:
                  pattern: ^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=|[A-Za-z0-9+/]{4})$
                  type: string
                fileType:
                  enum:
                  - xls
                  - csv
                  type: string
                templateName:
                  default: abc.xls
                  example: abc.xls
                  pattern: ^.*$
                  type: string
              required:
              - templateName
              - fileContent
              - fileType
              type: object
        description: Request to parse the xls/csv file as per provided data
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  dataOrientation:
                    type: string
                  dbResourceIndex:
                    type: number
                  sheet:
                    items:
                      properties:
                        Sections:
                          items:
                            properties:
                              rows:
                                items:
                                  type: object
                                type: array
                            required:
                            - rows
                            type: object
                          type: array
                      required:
                      - Sections
                      type: object
                    type: array
                  templateName:
                    pattern: ^.*$
                    type: string
                required:
                - templateName
                - dataOrientation
                - sheet
                type: object
          description: Expected response is dictionary formmatted data of particular
            file
      security:
      - oAuth2ClientCredentials:
        - connector:write
      summary: The API parse the xls file data as per provided template file and returns
        the data in JSON formatted. The template file states whether to return data
        or write the parsed data on DB
      tags:
      - File Handler
      x-openapi-router-controller: connectors.webserver.filehandler.readwrite
