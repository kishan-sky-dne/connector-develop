required:
  - status
properties:
  status:
    type: string
    example: failure
    enum:
      - success
      - failure
  id:
    type: integer
    example: 123
  errorCategory:
    type: string
    example: FAILED
    enum:
      - FAILED
      - RETRY
  errors:
    type: array
    items:
      type: object
      properties:
        code:
          type: string
          example: ERR-006-999-0005
        message:
          type: string
          example: IP Reservation for Interface failed.
  metadata:
    type: object
    required:
      - vrf
      - avlIpAddressList
    properties:
      vrf:
        type: string
        example: Global
      avlIpAddressList:
        type: array
        items:
          type: object
          properties:
            address:
              type: string
              example: 89.200.128.233/24