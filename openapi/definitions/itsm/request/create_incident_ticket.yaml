type: object
properties:    
  alertSummary:
    type: string
    minLength: 1
    maxLength: 100
    example: "Incident Raised as part of DNE order BPM-12345 (MAP-T Provisioning) under CHG1234567"
  assignTo:
    type: string
    minLength: 1
    enum:
      - "UK Digital Network Enabler Platform"
      - "UK ISP"
    example: "UK Digital Network Enabler Platform"
  detailedDescription:
    type: string
    minLength: 1
    maxLength: 4000
    example: "Rollback on ma0.bllabd1.isp.sky.com has been failed with <error message>"
  severity:
    type: string
    minLength: 1
    enum:
      - "p1"
      - "p2"
      - "p3"
      - "p4"
    example: "p4"
  monitoredItem:
    type: string
    minLength: 1
    example: "ma0.bllabd1.isp.sky.com"
  affectedArea:
    type: string
    minLength: 1
  helpURL:
    type: string
    minLength: 1
  monitoringGroup:
    type: string
    minLength: 1
  monitoringSystem:
    type: string
    minLength: 1
  updatable:
    type: string
    minLength: 1
  orderId:
    type: string
    minLength: 1
  orderType:
    type: string
    minLength: 1
  changeTicket:
    type: string
    minLength: 1
required:
  - assignTo
  - detailedDescription
  - monitoredItem
  - severity
