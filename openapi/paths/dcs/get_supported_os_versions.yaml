get:
  tags:
    - dcs
  summary: Retrieve all supported os versions from DCS
  description: Returns a list of all current os versions in the DCS system
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.dcs.tasks.read"
  operationId: get_all_device_os_versions
  parameters:
    - name: 'vendor'
      in: path
      required: true
      description: Vendor name to search for
      schema:
        type: string
        example: "Nokia"
    - name: 'platform'
      in: path
      required: true
      description: Platform name to search for
      schema:
        type: string
        example: "ios-xr"
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/dcs/response/get_supported_os_versions.yaml'
      description: Expected response of dcs module all current os versions