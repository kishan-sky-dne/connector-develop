type: array
items:
  type: object
  properties:
    op:
      type: string
      description: patch operation to be performed
      enum:
        - "add"
        - "replace"
    attribute:
      type: string
      pattern: '^/[a-zA-Z_]+$'  # Fix for Bug DNE-19171
      minLength: 1
      description: attribute on which the patch operation needs to be performed
    value:
      description: new value (for replace and add operations)
      minLength: 1
  required:
    - op
    - attribute