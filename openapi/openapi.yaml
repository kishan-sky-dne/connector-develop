                  type: string
                prefix:
                  description: IP Prefix pool
                  example: 89.200.128.0/24
                  pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)([\/]([1-9]|[12][0-9]|3[0-2]))?$
                  type: string
                routeDistinguisher:
                  example: 65444:28404
                  pattern: ^(0|[1-9][0-9]{0,8}|[1-3][0-9]{9}|4[01][0-9]{8}|42[0-8][0-9]{7}|429[0-3][0-9]{6}|4294[0-8][0-9]{5}|42949[0-5][0-9]{4}|429496[0-6][0-9]{3}|4294967[0-1][0-9]{2}|42949672[0-8][0-9]|429496729[0-5])[\:](0|[1-9][0-9]{0,8}|[1-3][0-9]{9}|4[01][0-9]{8}|42[0-8][0-9]{7}|429[0-3][0-9]{6}|4294[0-8][0-9]{5}|42949[0-5][0-9]{4}|429496[0-6][0-9]{3}|4294967[0-1][0-9]{2}|42949672[0-8][0-9]|429496729[0-5])$
                  type: string
                tags:
                  example:
                  - Loopback
                  items:
                    type: string
                  minItems: 1
                  type: array
                vrf:
                  example: Global
                  maxLength: 20
                  minLength: 1
                  type: string
              required:
              - address
