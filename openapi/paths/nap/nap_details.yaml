get:
  tags:
    - nap
  summary: Retrieve list of failed circuit of NAP external systems
  description: Get failed circuit of NAP external systems based on region
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.nap.tasks.read"
  operationId: get_nap_details
  parameters:
    - name: 'region'
      in: query
      required: false
      description: region of failed VOIP circuits
      schema:
        type: string
        example: Ireland
        enum:
          - Ireland
          - UK
          - Italy
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/nap/response/getNapDetails.yaml'
      description: Expected response of nap module for /getNapDetails call