components:
  securitySchemes:
    oAuth2ClientCredentials:
      description: See https://oauth.net/2/
      flows:
        clientCredentials:
          scopes:
            connector:read: Read connector information
            connector:write: Create/update/Delete connector information
          tokenUrl: https://auth.ts.isp.sky.com/token
      type: oauth2
      x-tokenInfoFunc: connectors.core.utils.oauth.get_token_info
info:
  description: Operational API for the Connector Layer
  title: Connectors API Documentation
  version: 1.0.0
openapi: 3.0.0
paths:
  /admin/image-details:
    delete:
      description: This API is used to delete the platform, region, OS version, OS
        status and image details
      operationId: delete_image_details
      parameters:
      - description: 'To delete Image details this ID should be passed.

          This id is given to the user as part of the query to upgrade details.

          '
        in: query
        name: osVersionDeviceRegionId
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errorCategory:
                    enum:
                    - FAILED
                    - RETRY
                    example: FAILED
                    type: string
                  errors:
                    items:
                      properties:
                        code:
                          example: ERR-999-009-0002
                          type: string
                        message:
                          example: Device OS Version is already in Active State
                          type: string
                      type: object
                    type: array
                  status:
                    enum:
                    - success
                    - failure
                    example: failure
                    type: string
                required:
                - status
          description: Expected response of connector module for /delete call
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
      security:
      - oAuth2ClientCredentials:
        - connector:write
      summary: Delete the image metadata information
      tags:
      - admin
      x-openapi-router-controller: connectors.webserver.admin.tasks.delete
    patch:
      description: 'Used to update the image details records.

        '
      operationId: update_image_details
      parameters:
      - description: To update Image details this ID should be passed.
        in: query
        name: osVersionDeviceRegionId
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                Comments:
                  example: Upgrade is due to certain reason...
                  maxLength: 2000
                  minLength: 1
                  type: string
                osStatus:
                  enum:
                  - Deprecated
                  - Current
                  - Under_test
                  - Decommissioned
                  - Target
                  example: Deprecated
                  maxLength: 50
                  minLength: 1
                  type: string
              required:
              - osStatus
              type: object
        description: Update image details
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  comments:
                    minLength: 1
                    type: string
                  osVersionDeviceRegionId:
                    minimum: 1
                    type: integer
                  status:
                    enum:
                    - SUCCESS
                    - FAILURE
                    type: string
                required:
                - status
                type: object
          description: Response while DIAL works on reading the service.
      security:
      - oAuth2ClientCredentials:
        - connector:write
      tags:
      - IOS-XR
      x-openapi-router-controller: connectors.webserver.admin.tasks.update
    post:
      description: This API is used to create the platform, region, OS version, OS
        status and image details
      operationId: create_image_details
      requestBody:
        content:
          application/json:
            schema:
              items:
                properties:
                  comments:
                    example: Optional field for user comments on software images
                    maxLength: 2000
                    minLength: 1
                    type: string
                  deviceModel:
                    enum:
                    - NCS5K
                    - ASR9K
                    - NCS540
                    - NCS1K
                    - NCS540L
                    - N540-24Q2C2DD-SYS
                    example: NCS5K
                    maxLength: 50
                    minLength: 1
                    type: string
                  deviceVendor:
                    enum:
                    - CISCO
                    - NOKIA
                    - HUAWEI
                    example: CISCO
                    maxLength: 50
                    minLength: 1
                    type: string
                  osDetails:
                    properties:
                      imageFiles:
                        items:
                          properties:
                            fileName:
                              example: /bluebird/ios-xr/7.1.0/NCS5K/install-image.tar
                              maxLength: 1000
                              minLength: 1
                              pattern: (.*\.)(iso|tar)$
                              type: string
                            fileSize:
                              example: '2742723234'
                              maxLength: 100
                              minLength: 1
                              pattern: ^[0-9]*$
                              type: string
                            imageType:
                              enum:
                              - iso
                              - tar
                              example: tar
                              maxLength: 3
                              minLength: 1
                              type: string
                            md5Value:
                              example: c05e19b77f977c2f3afe0b98f0b77aaa
                              maxLength: 32
                              minLength: 32
                              pattern: ^[a-zA-Z0-9]*$
                              type: string
                          required:
                          - imageType
                          - fileName
                          - md5Value
                          - fileSize
                          type: object
                        minItems: 1
                        type: array
                      packageDetails:
                        items:
                          properties:
                            packages:
                              items:
                                example: ncs540-sysadmin-shared-7.1.0.1-r712.CSCvx53252
                                maxLength: 1000
                                minLength: 1
                                type: string
                              type: array
                            type:
                              enum:
                              - XR
                              - SYSADMIN-FIX
                              - SYSADMIN-MOD
                              example: XR
                              maxLength: 50
                              minLength: 1
                              type: string
                          required:
                          - type
                          - packages
                          type: object
                        minItems: 1
                        type: array
                    required:
                    - imageFiles
                    type: object
                  osLabel:
                    example: 7.1.0-V1
                    maxLength: 50
                    minLength: 1
                    type: string
                  osStatus:
                    enum:
                    - Deprecated
                    - Current
                    - Under_test
                    - Decommissioned
                    - Target
                    example: Deprecated
                    maxLength: 50
                    minLength: 1
                    type: string
                  osVersion:
                    example: 7.1.0
                    maxLength: 20
                    minLength: 1
                    pattern: ^(\d+((\.\d+){1,2})?)$
                    type: string
                  region:
                    enum:
                    - UK
                    - IT
                    - DE
                    - IE
                    example: UK
                    maxLength: 10
                    minLength: 1
                    type: string
                required:
                - deviceVendor
                - deviceModel
                - region
                - osLabel
                - osStatus
                - osVersion
                type: object
              minItems: 1
              type: array
        description: Required details to add image metadata
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errorCategory:
                    enum:
                    - FAILED
                    - RETRY
                    example: FAILED
                    type: string
                  errors:
                    items:
                      properties:
                        code:
                          example: ERR-000-009-0001
                          type: string
                        message:
                          example: Failure in Database Operation
                          type: string
                      type: object
                    type: array
                  metadata:
                    properties:
                      failure:
                        items:
                          properties:
                            image:
                              properties:
                                deviceModel:
                                  type: string
                                deviceVendor:
                                  type: string
                                osLabel:
                                  type: string
                                osStatus:
                                  type: string
                                osVersion:
                                  type: string
                                region:
                                  type: string
                              type: object
                          type: object
                        type: array
                      success:
                        items:
                          properties:
                            image:
                              properties:
                                deviceModel:
                                  type: string
                                deviceVendor:
                                  type: string
                                osLabel:
                                  type: string
                                osStatus:
                                  type: string
                                osVersion:
                                  type: string
                                region:
                                  type: string
                              type: object
                            osVersionDeviceRegionId:
                              type: string
                          type: object
                        properties:
                          id:
                            type: string
                          type:
                            type: string
                        type: array
                    type: object
                  status:
                    enum:
                    - SUCCESS
                    - FAILURE
                    - PARTIAL-SUCCESS
                    example: failure
                    type: string
                required:
                - status
          description: Expected response for add image metadata information
      security:
      - oAuth2ClientCredentials:
        - connector:write
      summary: Add the image metadata information
      tags:
      - admin
      x-openapi-router-controller: connectors.webserver.admin.tasks.createImage
  /admin/image-upgrade-details:
    post:
      description: Request to create image upgrade details
      operationId: image_upgrade_details
      requestBody:
        content:
          application/json:
            schema:
              items:
                properties:
                  Comments:
                    example: Upgrade is due to certain reason...
                    minLength: 1
                    type: string
                  currentOsLabel:
                    example: 7.1.0-V1
                    maxLength: 50
                    minLength: 1
                    type: string
                  currentOsVersion:
                    example: 7.1.0
                    maxLength: 50
                    minLength: 1
                    type: string
                  deviceModel:
                    enum:
                    - NCS540
                    - NCS5K
                    - ASR9K
                    - NCS1K
                    - NCS540L
                    - N540-24Q2C2DD-SYS
                    example: NCS5K
                    maxLength: 50
                    minLength: 1
                    type: string
                  deviceVendor:
                    enum:
                    - CISCO
                    - NOKIA
                    - HUAWEI
                    example: Cisco
                    maxLength: 50
                    minLength: 1
                    type: string
                  region:
                    enum:
                    - UK
                    - IT
                    - DE
                    - IE
                    example: UK
                    maxLength: 10
                    minLength: 1
                    type: string
                  upgrade:
                    properties:
                      intermediateSteps:
                        items:
                          properties:
                            customConfig:
                              items:
                                properties:
                                  afterRollback:
                                    items:
                                      maxLength: 1024
                                      minLength: 1
                                      type: string
                                    minItems: 1
                                    type: array
                                  afterUpgrade:
                                    items:
                                      maxLength: 1024
                                      minLength: 1
                                      type: string
                                    minItems: 1
                                    type: array
                                  beforeRollback:
                                    items:
                                      maxLength: 1024
                                      minLength: 1
                                      type: string
                                    minItems: 1
                                    type: array
                                  beforeUpgrade:
                                    items:
                                      maxLength: 1024
                                      minLength: 1
                                      type: string
                                    minItems: 1
                                    type: array
                                  configMode:
                                    enum:
                                    - XR
                                    - ADMIN
                                    - XR_EXEC
                                    - ADMIN_EXEC
                                    example: ADMIN
                                    maxLength: 10
                                    minLength: 1
                                    type: string
                                  deviceRole:
                                    items:
                                      maxLength: 100
                                      minLength: 1
                                      type: string
                                    type: array
                                  isRollbackRequired:
                                    example: true
                                    type: boolean
                                required:
                                - deviceRole
                                - configMode
                                type: object
                              type: array
                            osLabel:
                              example: 7.3.0-V1
                              maxLength: 50
                              minLength: 1
                              type: string
                            osVersion:
                              example: 7.3.0
                              maxLength: 50
                              minLength: 1
                              type: string
                            sequence:
                              example: 1
                              maximum: 5
                              minimum: 1
                              type: integer
                          required:
                          - osVersion
                          - osLabel
                          - sequence
                          type: object
                        minItems: 1
                        type: array
                      targetOs:
                        properties:
                          customConfig:
                            items:
                              properties:
                                afterRollback:
                                  items:
                                    maxLength: 1024
                                    minLength: 1
                                    type: string
                                  minItems: 1
                                  type: array
                                afterUpgrade:
                                  items:
                                    maxLength: 1024
                                    minLength: 1
                                    type: string
                                  minItems: 1
                                  type: array
                                beforeRollback:
                                  items:
                                    maxLength: 1024
                                    minLength: 1
                                    type: string
                                  minItems: 1
                                  type: array
                                beforeUpgrade:
                                  items:
                                    maxLength: 1024
                                    minLength: 1
                                    type: string
                                  minItems: 1
                                  type: array
                                configMode:
                                  enum:
                                  - XR
                                  - ADMIN
                                  - XR_EXEC
                                  - ADMIN_EXEC
                                  example: ADMIN
                                  maxLength: 10
                                  minLength: 1
                                  type: string
                                deviceRole:
                                  items:
                                    maxLength: 100
                                    minLength: 1
                                    type: string
                                  type: array
                                isRollbackRequired:
                                  example: true
                                  type: boolean
                              required:
                              - deviceRole
                              - configMode
                              type: object
                            minItems: 1
                            type: array
                          osLabel:
                            example: 7.5.1-V1
                            maxLength: 50
                            minLength: 1
                            type: string
                          osVersion:
                            example: 7.5.1
                            maxLength: 50
                            minLength: 1
                            type: string
                        required:
                        - osVersion
                        - osLabel
                        type: object
                      upgradeSteps:
                        example: 2
                        maximum: 5
                        minimum: 1
                        type: integer
                    required:
                    - upgradeSteps
                    - targetOs
                    type: object
                required:
                - deviceVendor
                - deviceModel
                - region
                - currentOsVersion
                - currentOsLabel
                - upgrade
                type: object
              minItems: 1
              type: array
        description: Creates configuration for circuit test interface
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errorCategory:
                    enum:
                    - FAILED
                    - RETRY
                    type: string
                  errors:
                    items:
                      properties:
                        code:
                          type: string
                        message:
                          type: string
                      type: object
                    type: array
                  metadata:
                    properties:
                      failure:
                        items:
                          properties:
                            image:
                              properties:
                                deviceModel:
                                  type: string
                                deviceVendor:
                                  type: string
                                osLabel:
                                  type: string
                                osStatus:
                                  type: string
                                osVersion:
                                  type: string
                                region:
                                  type: string
                              type: object
                          type: object
                        type: array
                      success:
                        items:
                          properties:
                            image:
                              properties:
                                deviceModel:
                                  type: string
                                deviceVendor:
                                  type: string
                                osLabel:
                                  type: string
                                osStatus:
                                  type: string
                                osVersion:
                                  type: string
                                osVersionDeviceRegionId:
                                  type: string
                                region:
                                  type: string
                              type: object
                          type: object
                        type: array
                    type: object
                  status:
                    enum:
                    - SUCCESS
                    - FAILURE
                    - PARTIAL-SUCCESS
                    type: string
                required:
                - status
                type: object
          description: Response while connector works on reading the software inventory
            details.
      security:
      - oAuth2ClientCredentials:
        - connector:write
      summary: create image upgrade details
      tags:
      - Upgrade
      x-openapi-router-controller: connectors.webserver.admin.tasks.upgrade_details
  /admin/inventory_details:
    get:
      description: Request to get the software inventory details
      operationId: get_inventory_details
      parameters:
      - description: possible values are deviceVendor, deviceModel, region, osState,
          deviceRole, packageType, fileType.
        in: query
        name: _include
        required: false
        schema:
          items:
            enum:
            - deviceVendor
            - deviceModel
            - region
            - osState
            - deviceRole
            - packageType
            - fileType
            minLength: 1
            type: string
          type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  currentState:
                    items:
                      properties:
                        state:
                          type: string
                        stateId:
                          type: string
                      type: object
                    type: array
                  deviceModel:
                    items:
                      properties:
                        deviceId:
                          type: string
                        model:
                          type: string
                      type: object
                    type: array
                  deviceRole:
                    items:
                      properties:
                        role:
                          type: string
                        roleId:
                          type: string
                      type: object
                    type: array
                  deviceVendor:
                    items:
                      properties:
                        deviceId:
                          type: string
                        vendor:
                          type: string
                      type: object
                    type: array
                  fileType:
                    items:
                      properties:
                        file:
                          type: string
                        fileId:
                          type: string
                      type: object
                    type: array
                  packageType:
                    items:
                      properties:
                        package:
                          type: string
                        packageId:
                          type: string
                      type: object
                    type: array
                  region:
                    items:
                      properties:
                        region:
                          type: string
                        regionId:
                          type: string
                      type: object
                    type: array
          description: Response while connector works on reading the software inventory
            details.
      security:
      - oAuth2ClientCredentials:
        - connector:read
      summary: Get software inventory details
      tags:
      - Upgrade
      x-openapi-router-controller: connectors.webserver.admin.tasks.inventory_details
  /admin/upgrade-details:
    delete:
      description: This API is used to delete the os version upgrade details
      operationId: delete_upgrade_details
      parameters:
      - description: 'To delete Upgrade details this ID should be passed.

          This id is given to the user as part of the query to upgrade details.

          '
        in: query
        name: osVersionUpgradeId
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errorCategory:
                    enum:
                    - FAILED
                    - RETRY
                    example: FAILED
                    type: string
                  errors:
                    items:
                      properties:
                        code:
                          example: ERR-999-009-0002
                          type: string
                        message:
                          example: Device OS Version is already in Active State
                          type: string
                      type: object
                    type: array
                  status:
                    enum:
                    - success
                    - failure
                    example: failure
                    type: string
                required:
                - status
          description: Expected response of connector module for /delete call
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
      security:
      - oAuth2ClientCredentials:
        - connector:write
      summary: Delete the image upgrade details
      tags:
      - Upgrade
      x-openapi-router-controller: connectors.webserver.admin.tasks.delete
    get:
      description: 'Used to view the current upgrade and image details records.

        '
      operationId: read_upgrade_details
      parameters:
      - description: 'How many entries to be queried in the sorted List.

          Sorting order will be on the time of image detail creation, latest version,
          version state.

          '
        in: query
        name: limit
        required: false
        schema:
          minimum: 1
          type: integer
      - description: 'Page offset of the sorted list.

          '
        in: query
        name: offset
        required: false
        schema:
          minimum: 0
          type: integer
      - description: 'If present then the possible values are

          1) brief: this can be used with any of the search combination.

          2) trafficDiversion: this field will be used to get the traffic diversion
          protocols.

          3) serviceChecks: to get service checks details for device and role

          4) imageDetail: this can be used to get all the image details.

          '
        in: query
        name: _include
        required: false
        schema:
          enum:
          - brief
          - trafficDiversion
          - serviceChecks
          - imageDetail
          type: string
      - description: 'Regions where these devices are present.

          '
        in: query
        name: region
        required: false
        schema:
          enum:
          - UK
          - IT
          - DE
          - IE
          maxLength: 10
          minLength: 1
          type: string
      - description: 'This field contains Device Vendor like Cisco, Huawei, Nokia,

          '
        in: query
        name: deviceVendor
        required: false
        schema:
          enum:
          - CISCO
          - HUAWEI
          - NOKIA
          maxLength: 50
          minLength: 1
          type: string
      - description: 'Device hardware models for a given vendor ex NCS5k, ASR9K

          '
        in: query
        name: deviceModel
        required: false
        schema:
          enum:
          - NCS5K
          - ASR9K
          - NCS540
          - NCS1K
          - NCS540L
          - N540-24Q2C2DD-SYS
          maxLength: 50
          minLength: 1
          type: string
      - description: 'Current State of the OS in the given region

          '
        in: query
        name: currentState
        required: false
        schema:
          enum:
          - Deprecated
          - Current
          - Under_test
          - Decommissioned
          maxLength: 50
          minLength: 1
          type: string
      - description: 'Target State of the OS in the given region

          '
        in: query
        name: targetState
        required: false
        schema:
          enum:
          - Deprecated
          - Current
          - Under_test
          - Decommissioned
          maxLength: 50
          minLength: 1
          type: string
      - description: 'This is the role this platform plays in the given region.

          This field is used along with _include=trafficDiversion to get the protocols
          to be diverted.

          '
        in: query
        name: deviceRole
        required: false
        schema:
          maxLength: 50
          minLength: 1
          type: string
      - description: 'Source version of the OS

          '
        in: query
        name: currentVersion
        required: false
        schema:
          maxLength: 20
          minLength: 1
          pattern: ^(\d+((\.\d+){1,2})?)$
          type: string
      - description: 'Source Label of the OS

          '
        in: query
        name: currentLabel
        required: false
        schema:
          maxLength: 50
          minLength: 1
          type: string
      - description: 'Target version of the OS

          '
        in: query
        name: targetVersion
        required: false
        schema:
          maxLength: 20
          minLength: 1
          pattern: ^(\d+((\.\d+){1,2})?)$
          type: string
      - description: 'Target label of the OS

          '
        in: query
        name: targetLabel
        required: false
        schema:
          maxLength: 50
          minLength: 1
          type: string
      - description: 'To view Upgrade details this ID of the should be passed.

          This id is given to the user as part of the search or query.

          '
        in: query
        name: osVersionUpgradeId
        required: false
        schema:
          minimum: 1
          type: integer
      - description: 'To view Image details this ID of the should be passed.

          This id is given to the user as part of the query to upgrade details.

          '
        in: query
        name: osVersionDeviceRegionId
        required: false
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  limit:
                    type: string
                  offset:
                    type: string
                  resultSet:
                    items:
                      type: object
                    type: array
                  total:
                    type: string
                type: object
          description: Response while DIAL works on reading the service.
      security:
      - oAuth2ClientCredentials:
        - connector:read
      tags:
      - Upgrade
      x-openapi-router-controller: connectors.webserver.admin.tasks.read_upgrade
    put:
      description: 'Used to update the upgrade image details records.

        '
      operationId: update_upgrade_details
      parameters:
      - description: To update Upgrade details this ID should be passed.
        in: query
        name: osVersionUpgradeId
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                Comments:
                  example: Upgrade is due to certain reason...
                  maxLength: 2000
                  minLength: 1
                  type: string
                upgradeDetails:
                  properties:
                    intermediateSteps:
                      items:
                        properties:
                          customConfig:
                            items:
                              properties:
                                afterRollback:
                                  items:
                                    maxLength: 1024
                                    minLength: 1
                                    type: string
                                  type: array
                                afterUpgrade:
                                  items:
                                    maxLength: 1024
                                    minLength: 1
                                    type: string
                                  type: array
                                beforeRollback:
                                  items:
                                    maxLength: 1024
                                    minLength: 1
                                    type: string
                                  type: array
                                beforeUpgrade:
                                  items:
                                    maxLength: 1024
                                    minLength: 1
                                    type: string
                                  type: array
                                configMode:
                                  enum:
                                  - XR
                                  - ADMIN
                                  - XR_EXEC
                                  - ADMIN_EXEC
                                  example: ADMIN
                                  maxLength: 10
                                  minLength: 1
                                  type: string
                                deviceRole:
                                  items:
                                    maxLength: 100
                                    minLength: 1
                                    type: string
                                  type: array
                                isRollbackRequired:
                                  example: true
