post:
  tags:
    - anp
  summary: Update TG deliverable on A&P tracker
  description: Update status,expected deliverydate,comments on A&P tracker for a TG reference
  security:
    - oAuth2ClientCredentials: [connector:write]
  x-openapi-router-controller: "connectors.webserver.anp.tasks.update"
  operationId: updateTGReference
  parameters:
    - in: header
      name: ad_username
      schema:
        type: string
      required: false
    - in: header
      name: ad_password
      schema:
        type: string
        format: password
      required: false
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../../definitions/anp/update/post_body.yaml"
    description: Updates a TG reference in A&P portal
    required: true
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/anp/update/response.yaml'
      description: Expected response of A&P portal for updating TG reference
