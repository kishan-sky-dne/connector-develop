get:
  tags:
    - horizon
  summary: Get details of horizon deliverable
  description: Horizon deliverable api
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.horizon.tasks.read"
  operationId: read_horizon_deliverable
  parameters:
    - name: 'order_id'
      in: query
      required: false
      description: DNE order-id(BPM) for Sky services
      schema:
        type: string
    - name: "unique_reference"
      in: query
      required: false
      description: unique order reference
      schema:
        type: string
  responses:
      '200':
        description: OK
        content:
          text/plain:
            schema:
              type: string
              example: Hello world