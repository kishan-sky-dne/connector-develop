type: object
properties:
  parentTicket:
    type: string
    example: "CHG123456789"
    pattern: '^(CHG)[0-9]*$'
  ticketType:
    type: string
    example: "change"
    enum:
      - change
  customerName:
    type: array
    items:
      type: string
      minLength: 1
    minItems: 1
  impact:
    type: string
    example: Reduced capacity
  reason:
    type: string
    example: Maintenance-Sky work
required:
  - parentTicket
  - ticketType
  - customerName