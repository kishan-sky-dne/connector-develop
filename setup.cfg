[bumpversion]
current_version = 0.1.0
commit = False
tag = False

[isort]
line_length = 120
profile=black
known_first_party=connectors,test
known_sky=isp_config
known_third_party = connexion,dateutil,flask,jinja2,jwt,pymongo,pytest,pythonjsonlogger,requests,setuptools,urllib3,werkzeug,xlrd,xlutils,yaml
import_heading_stdlib=Standard Library
import_heading_thirdparty=Third Party Library
import_heading_firstparty=DNE Library
import_heading_sky=Sky Library
sections=FUTURE,STDLIB,THIRDPARTY,SKY,FIRSTPARTY,LOCALFOLDER

[flake8]
max-line-length = 120
max-complexity = 15
exclude = *.egg, *.egg-info, yang-models, build,dist, *.pyc, yang, pybind, .idea
select = E,W,F,C,N,T
ignore=F541,W503,E203

[coverage:run]
branch = True
source =
    connectors
omit =
    */core/utils/log.py
    */uwsgi.py
    */webserver/maintenance_controller.py
    */webserver/itsm/tasks/ticketResolver.py
    */__init__.py

[coverage:paths]
source =
   src/connectors
   .tox/*/lib/python*/site-packages/connectors


[coverage:report]
show_missing = True
precision = 2

[bumpversion:file:setup.py]

[bumpversion:file:Makefile]

[bumpversion:file:openapi/openapi.yaml]

[bumpversion:file:docs/source/conf.py]

[bumpversion:file:src/dial/__init__.py]

[tool:pytest]
asyncio_default_fixture_loop_scope=function