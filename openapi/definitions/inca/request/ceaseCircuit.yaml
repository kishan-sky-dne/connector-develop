type: object
properties:
  geaCeaseDetails:
    type: object
    properties:
      messageType:
        type: string
        enum:
          - GEACEASE
      requestDate:
        type: string
        pattern: ^\d{4}-\d{2}-\d{2}$
        example: 2023-12-14
      exchange:
        type: string
        minLength: 1
        maxLength: 20
        example: WNWX
      tgReference:
        example: TG9989
        type: string
        pattern: ^([Tt][Gg])\d{1,}
        minLength: 2
      requiredByDate:
        type: string
        pattern: ^\d{4}-\d{2}-\d{2}$
        example: 2023-12-31
      btSwitch:
        type: string
        minLength: 1
        maxLength: 20
        example: BAACHK
      circuitCeaseOrderRef:
        type: string
        minLength: 1
        maxLength: 100
        example: OGHP64783778-3456789-CEASE
      cablelinkRef:
        type: string
        minLength: 4
        pattern: ^OGHP
        example: OGHP64783778
    required:
      - messageType
      - requestDate
      - exchange
      - tgReference
      - requiredByDate
      - btSwitch
      - circuitCeaseOrderRef
      - cablelinkRef
required:
  - geaCeaseDetails