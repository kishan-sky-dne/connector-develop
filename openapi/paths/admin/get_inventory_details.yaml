get:
  tags:
    - Upgrade
  summary: Get software inventory details
  description: Request to get the software inventory details
  security:
    - oAuth2ClientCredentials: [ connector:read ]
  x-openapi-router-controller: "connectors.webserver.admin.tasks.inventory_details"
  operationId: get_inventory_details
  parameters:
    - name: '_include'
      in: query
      required: False
      description: possible values are deviceVendor, deviceModel, region, osState,
                   deviceRole, packageType, fileType.
      schema:
        type: array
        items:
          type: string
          minLength: 1
          enum:
            - deviceVendor
            - deviceModel
            - region
            - osState
            - deviceRole
            - packageType
            - fileType
  responses:
    '200':
      description: "Response while connector works on reading the software inventory details."
      content:
        application/json:
          schema:
            $ref: '../../definitions/admin/get_inventory_details_response.yaml'

