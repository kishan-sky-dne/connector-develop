type: object
properties:
  status:
    type: "string"
    example: "SUCCESS"
    enum:
      - SUCCESS
      - FAILURE
      - PARTIAL-SUCCESS
  successResponse:
    type: array
    items:
      type: object
      properties:
        customer:
          type: string
          example: "Amdocs"
        message:
          type: string
          example: "TPCHGXXXXXXX (WHOLESALE PORTAL TASK CREATED)"
  failedResponse:
    type: array
    items:
      type: object
      properties:
        code:
          type: string
          example: "ERR-003-999-1001"
        customer:
          type: string
          example: "Amdocs"
        message:
          type: string
          example: "TPCHGXXXXXXX (WHOLESALE PORTAL TASK CREATED)"
  errorCategory:
    type: "string"
    example: "FAILED"
    enum:
      - FAILED
  errors:
    type: array
    items:
      type: object
      properties:
        code:
          type: string
          example: "ERR-003-999-1001"
        message:
          type: string
          example: "Third party ticket creation has been failed with error"
        customer:
          type: string
          example: "Amdocs"