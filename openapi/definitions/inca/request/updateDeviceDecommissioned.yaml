type: object

properties:
  orderId:
      type: string
      example: "BPM-12345"
      pattern: '^[A-Z]+-[0-9]+[0-9]*$'
  network:
      type: string
      example: "UK"
  mdfId:
    type: string
    example: "MDF123456"
    minLength: 1
  devices:
    type: array
    minItems: 1
    items:
      properties:
        hostname:
          type: string
          example: "ma0.myls.isp.sky.com"
          maxLength: 36
      required:
      - hostname
required:
- mdfId
- devices