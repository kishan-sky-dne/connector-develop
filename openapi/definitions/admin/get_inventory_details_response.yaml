properties:
  deviceVendor:
    type: array
    items:
      type: object
      properties:
        deviceId:
          type: string
        vendor:
          type: string
  deviceModel:
    type: array
    items:
      type: object
      properties:
        deviceId:
          type: string
        model:
          type: string
  region:
    type: array
    items:
      type: object
      properties:
        regionId:
          type: string
        region:
          type: string
  currentState:
    type: array
    items:
      type: object
      properties:
        stateId:
          type: string
        state:
          type: string
  deviceRole:
    type: array
    items:
      type: object
      properties:
        roleId:
          type: string
        role:
          type: string
  packageType:
    type: array
    items:
      type: object
      properties:
        packageId:
          type: string
        package:
          type: string
  fileType:
    type: array
    items:
      type: object
      properties:
        fileId:
          type: string
        file:
          type: string


