delete:
  tags:
    - ipam
  summary: Delete the ip selected by the user
  description: Request netbox to delete the given ip address
  security:
     - oAuth2ClientCredentials: [connector:write]
  x-openapi-router-controller: "connectors.webserver.ipam.tasks.delete_ip_address"
  operationId: delete_netbox_ipaddress
  parameters:
    - name: 'ID'
      in: path
      required: true
      description: ip to be deleted from netbox
      schema:
        type: integer
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/ipam/deleteIP/delete_response.yaml'
      description: Status of deletion of ip address