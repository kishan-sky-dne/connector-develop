post:
  tags:
    - Service Record
  summary: This API will read specific service record
  description: This API will read specific service record
  security:
    - oAuth2ClientCredentials: [ connector:read ]
  x-openapi-router-controller: "connectors.webserver.service_record.tasks.read"
  operationId: get_service_record
  parameters:
    - name: 'type'
      in: query
      required: true
      description: Type of database to be read
      schema:
        type: string
        example: mongo
        enum:
          - mongo
    - name: '_include'
      in: query
      required: false
      schema:
        type: string        
        enum:
          - brief        
  requestBody:
    description: Request body of database to be read.
    required: true
    content:
      application/json:
        schema:
          type: object
  responses:
    '200':
      description: Expected response of service record read
      content:
        application/json:
          schema:
            type: string
          examples:
            $ref: '../../definitions/service_record/response/read.yaml'
