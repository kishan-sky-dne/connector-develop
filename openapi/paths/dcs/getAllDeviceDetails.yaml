post:
  tags:
    - dcs
  description:  DNE connector services for getting all device details from DCS.
  security:
    - oAuth2ClientCredentials: [connector:write]
  operationId: get_all_device_details
  x-openapi-router-controller: "connectors.webserver.dcs.tasks.write"
  parameters:
    - name: 'pageNumber'
      in: query
      required: false
      description: current page number
      schema:
        type: integer
        minimum: 1
    - name: 'limit'
      in: query
      required: false
      description: Number of results to return per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
    - name: 'offset'
      in: query
      required: false
      description: The initial index from which to return the results
      schema:
        type: integer
  requestBody:
    description: Required details to get all device details in dcs system
    content:
      application/json:
        schema:
          $ref: '../../definitions/dcs/request/getDeviceRequest.yaml'
  responses:
    '200':
      description: Response to device details in dcs system
      content:
        application/json:
          schema:
            $ref: '../../definitions/dcs/response/getAllDeviceDetails.yaml'