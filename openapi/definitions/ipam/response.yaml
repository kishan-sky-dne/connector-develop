required:
   - status
properties:
   status:
     type: string
     example: Failure
     enum :
       - Success
       - Failure
   errorCategory:
     type: string
     example: FAILED
     enum :
       - FAILED
       - RETRY
   errors:
     type: array
     items:
       type: object
       properties:
         code:
           type: string
           example: ERR-006-999-1001
         message:
           type: string
           example: Prefix does not exists. Please provide proper Prefix
   metadata:
     required:
       - vrf
       - avlIpAddressList
     properties:
       vrf:
         type: string
         example: Global
       avlIpAddressList:
         type: array
         items:
           type: string
           example: 89.200.128.233/24
     type: object