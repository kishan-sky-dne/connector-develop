---
#============================================================
# Connectors - Develop Environment Pipeline
# Auto-triggers on develop branch commits
#============================================================

resources:
  - name: repo-develop
    type: git
    icon: github
    check_every: 1m
    webhook_token: &webhook-token ((common-creds.webhook_token))
    source: &git-source
      uri: https://github.com/kishan-sky-dne/connector-develop.git
      username: ((common-creds.github_username))
      password: ((common-creds.github_personal_access_token))
      branch: main

groups:
  - name: all
    jobs:
      - gitleaks-scan
      - lint
      # - build-docker
      - deploy-cks-onx
      - deploy-cks-sce

x-params-develop-cks-deploy-base: &params-develop-cks-deploy-base
