get:
  tags:
    - itsm
  summary: Change Restrictions
  description: requests to spark for change restrictions details
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.itsm.tasks.ticketRestrictions"
  operationId: change_restrictions
  parameters:
    - name: 'start_date'
      in: query
      schema:
        type: integer
        format: int64
    - name: 'end_date'
      in: query
      schema:
        type: integer
        format: int64
    - name: 'serviceType'
      in: query
      schema:
        type: string
        example: metroMigration
        description: Created for Business Process module to get the restrictions for given value
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/itsm/response/change_restrictions.yaml'
      description: Expected response from Spark