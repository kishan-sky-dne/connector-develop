required:
  - status
properties:
  status:
    type: string
    example: "SUCCESS|FAILURE"
    enum: ["SUCCESS", "FAILURE"]
  errorCategory:
    type: string
    example: "FAILED"
    enum: ["FAILED"]
  errors:
    type: array
    items:
      type: object
      properties:
        code:
          type: string
          example: "ERR-007-999-4001"
        message:
          type: string
          example: "Error message"