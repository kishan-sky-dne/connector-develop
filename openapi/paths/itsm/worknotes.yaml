post:
  tags:
    - itsm
  summary: Add worknote to SPARK ticket into ServiceNow
  description: requests to spark to add Worknote for the ticket
  security:
    - oAuth2ClientCredentials: [connector:write]
  x-openapi-router-controller: "connectors.webserver.itsm.tasks.ticketAddNote"
  operationId: add_note
  requestBody:
    description: Required details to add Worknote
    content:
      'application/json':
        schema:
          $ref: '../../definitions/itsm/request/worknotes.yaml'
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/itsm/response/worknotes.yaml'
      description: Expected response from Spark