get:
  tags:
    - inca
  summary: Retrieve different type of INCA device and associated subnet details
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.inca.tasks.read"
  operationId: get_device_details
  description: Used to get Device details and its associated subnets from the INCA system.
  parameters:
    - description: Hostname(Without domain name). Either hostname or exchangeName is mandatory
      example: vm0.bllon
      in: query
      name: hostname
      schema:
        items:
          type: string
          minLength: 1
        type: array
        minItems: 1
    - description: exchangeName. Either hostname or exchangeName is mandatory
      example: smlea
      in: query
      name: exchangeName
      schema:
        type: string
        minLength: 1
  responses:
    '200':
      description: Expected response of inca device details and its associated subnet
      content:
        application/json:
          schema:
            $ref: '../../definitions/inca/response/getIncaDeviceDetails.yaml'
