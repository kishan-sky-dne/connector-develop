required:
  - filters
properties:
  filters:
    items:
      type: object
      required:
        - param
        - operator
        - values
      properties:
        param:
          type: string
          example: vendor | os | hostname | model
          minLength: 1
          maxLength: 100
        operator:
          type: string
          enum: ["eq", "gt", "gte", "lt", "lte", "ne", "regex"]
          example: "eq"
        values:
          type: array
          items:
            type: string
            example: "[cisco | iosxr | ma0.bllabd1 | N540-ACC-SYS]"
            description: "Value that needs to be filtered"
            minLength: 1
            maxLength: 100
          minItems: 1
          maxItems: 10
        logicalOperator:
          type: string
          example: "and | or"
          description: "Logical operation to be performed with next filter and Default will be and."
          minLength: 1
          maxLength: 3
    type: array
    minItems: 1
    maxItems: 5