  DOCKERCONFIGJSON: ((common-creds.dockerconfigjson))

jobs:
  - name: gitleaks-scan
    public: true
    plan:
      - get: repo-develop
        trigger: true
      - task: run-gitleaks
        file: repo-develop/concourse/tasks/gitleaks.yml
        input_mapping: {repo: repo-develop}

  - name: lint
    public: true
    plan:
      - get: repo-develop
        trigger: true
        passed: [gitleaks-scan]
      - task: run-lint
        file: repo-develop/concourse/tasks/lint.yml
        input_mapping: {repo: repo-develop}
        params:
          GITHUB_TOKEN: ((common-creds.github_personal_access_token))
          HARBOR_REGISTRY: ((common-creds.harbor_registry))

  # - name: build-docker
  #   public: true
  #   serial: true
  #   plan:
  #     - get: repo-develop
  #       trigger: true
  #       passed: [lint]
  #     - task: build-and-push
  #       privileged: true
  #       file: repo-develop/concourse/tasks/build-docker.yml
  #       input_mapping: {repo: repo-develop}
  #       params:
  #         HARBOR_USERNAME: ((common-creds.harbor_username))
  #         HARBOR_PASSWORD: ((common-creds.harbor_password))
  #         HARBOR_REGISTRY: ((common-creds.harbor_registry))
  #         IMAGE_NAME: ipnd-dne/connectors
  #         IMAGE_TAG: develop

  - name: deploy-cks-onx
    public: true
    plan:
      - get: repo-develop
        trigger: true
        passed: [lint]
      - task: deploy-to-cks-onx
        file: repo-develop/concourse/tasks/deploy-cks.yml
        input_mapping: {repo: repo-develop}
        params:
          <<: *params-develop-cks-deploy-base
          DATACENTER: onx
          KUBECONFIG_CONTENT: ((develop-onx-kubeconfig-new))

  - name: deploy-cks-sce
    public: true
    plan:
      - get: repo-develop
        trigger: true
        passed: [lint]
      - task: deploy-to-cks-sce
        file: repo-develop/concourse/tasks/deploy-cks.yml
        input_mapping: {repo: repo-develop}
        params:
          <<: *params-develop-cks-deploy-base
          DATACENTER: sce
          KUBECONFIG_CONTENT: ((develop-sce-kubeconfig-new))
