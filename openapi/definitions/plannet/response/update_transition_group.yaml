        type: "object"
        properties: 
          id: 
            type: "number"
          name: 
            type: "string"
          name_str: 
            type: "string"
          date: 
            type: "string"
          dependencies: 
            type: "array"
            items: 
              type: "string"
          domains: 
            type: "array"
            items: 
              type: "string"
          coordinator: 
            type: "string"
          nis_ref: 
            type: "string"
    created: 
      type: "string"
    last_updated: 
      type: "string"
    name: 
      type: "string"
    date: 
      type: "string"
    description: 
      type: "string"
    coordinator: 
      type: "string"
    nis_ref: 
      type: "string"
