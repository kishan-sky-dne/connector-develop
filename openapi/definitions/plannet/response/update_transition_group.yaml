    - "id"
    - "domains"
    - "dependencies"
    - "created"
    - "last_updated"
    - "name"
    - "date"
    - "description"
    - "coordinator"
    - "nis_ref"
  properties: 
    id: 
      type: "number"
    domains: 
      type: "array"
      items: 
        type: "object"
        properties: 
          id: 
            type: "number"
          name: 
            type: "string"
          fullname: 
            type: "string"
