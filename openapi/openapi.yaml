  /ipam/ipv4-address:
    get:
      description: Request to get the list of available IPs for the given prefix
      operationId: get_available_ips
      parameters:
      - description: IP Prefix pool
        example: 89.200.128.0/24
        in: query
        name: prefix
        required: true
        schema:
          pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)([\/]([1-9]|[12][0-9]|3[0-2]))?$
          type: string
      - description: Networks such as UK and IT
        example: UK
        in: query
        name: network
        required: true
        schema:
          enum:
          - UK
          - IT
          type: string
      - example: Core
        in: query
        name: domain
        required: true
        schema:
          enum:
          - Core
          - DCN
          - ISP
          - Broadband
          - CDN
          - Edge
          - Mobile
          - Interconnect
          type: string
      - description: Limit on number of first Available IPs records
        example: 3
        in: query
        name: quantity
        required: false
        schema:
          default: 10
          maximum: 50
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errorCategory:
                    enum:
                    - FAILED
                    - RETRY
                    example: FAILED
                    type: string
                  errors:
                    items:
                      properties:
                        code:
                          example: ERR-006-999-1001
                          type: string
                        message:
                          example: Prefix does not exists. Please provide proper Prefix
                          type: string
                      type: object
                    type: array
                  metadata:
                    properties:
                      avlIpAddressList:
                        items:
                          example: 89.200.128.233/24
                          type: string
                        type: array
                      vrf:
                        example: Global
                        type: string
                    required:
                    - vrf
                    - avlIpAddressList
                    type: object
                  status:
                    enum:
                    - Success
                    - Failure
                    example: Failure
                    type: string
                required:
                - status
          description: List of available IPs for the given prefix
      security:
      - oAuth2ClientCredentials:
        - connector:read
      summary: Get the list of available IPs for the given prefix
      tags:
      - ipam
      x-openapi-router-controller: connectors.webserver.ipam.tasks.get_ip_address
