type: object
properties:
  status:
    type: "string"
    example: "SUCCESS"
  results:
    type: array
    items:
      type: object
      properties:
        parentCI:
          type: string
          example: me0.mypon.isp.sky.com
        relationshipType:
          type: string
          example: "Connects to::Connected by"
          enum:
            - "Connects to::Connected by"
            - "Depends on::Used by"
        childCI:
          type: string
          example: ONEA45266093
        action:
          type: string
          example: add
        postUrlPath:
          type: string
          example: "https://sparkproxyuat.azure-api.net//service3605/request?action=add&parent_ci=me0.mypon.isp.sky.com&child_ci=ONEA45266093&relationship_type=Depends on::Used by"
        relationshipStatus:
          type: string
          example: "Created relationship for 'me0.mypon.isp.sky.com <<>> ONEA45266093"
