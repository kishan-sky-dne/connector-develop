put:
  tags:
    - inca
  summary: Update device status to DNE decommissioned in INCA system
  security:
    - oAuth2ClientCredentials: [connector:write]
  x-openapi-router-controller: "connectors.webserver.inca.tasks.update"
  operationId: update_device_decommissioned
  description: Used to update device status to DNE Decommissioned for the list of input devices.
  requestBody:
    description: Required details to update device decommissioned status in INCA system
    required: true
    content:
      application/json:
        schema:
          $ref: '../../definitions/inca/request/updateDeviceDecommissioned.yaml'
  responses:
    '200':
      description: Expected response of inca device update decommissioned status
      content:
        application/json:
          schema:
            $ref: '../../definitions/inca/response/updateDeviceDecommissioned.yaml'