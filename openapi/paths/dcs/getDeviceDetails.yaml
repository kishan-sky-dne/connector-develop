get:
  tags:
    - dcs
  summary: Retrieve device details from DCS
  description: Get meta data of the device from DCS
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.dcs.tasks.read"
  operationId: getDeviceDetails
  parameters:
    - name: 'hostname'
      in: path
      required: true
      description: Name of the host
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/dcs/response/getDeviceDetails.yaml'
      description: Expected response of dcs module for /getDevice call