[uwsgi]
module = connectors.uwsgi:app
http-socket = :5000
master = true
processes = 4
threads = 2
lazy-apps = true
# if we don't increase buffer size, it will error out
buffer-size = 32768
vacuum = true
harakiri = 60
# uwsgi request logs
logger-req = stdio
log-format = "status": "%(status)", "X-Forwarded-Host": "%(host)", "X-Forwarded-Proto": "%(proto)", "remote-address": "%(addr)", "pathname": "%(uri)", "httpVerb": "%(method)"
log-req-encoder = format {"timestamp":"${strftime:%%Y-%%m-%%dT%%H:%%M:%%S}", ${msg}}
log-req-encoder = nl