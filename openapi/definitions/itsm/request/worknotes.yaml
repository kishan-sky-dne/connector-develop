type: object
properties:
  chgtktNumber:
    type: string
    example: CHG123456789
    pattern: '^(CHG|CTASK|INC|INCTASK|PRB|PTASK|SCTASK)[0-9]*$'             # Fix for Bug DNE-2578
  workNotes:
    type: string
    example: 'This is 1st note'
    minLength: 1
    maxLength: 4000
  comments:
    type: string
    example: 'This is a comment'
    minLength: 1
    maxLength: 4000
  templatedWorkNote:
    type: object
    properties:
      templateName:
        type: string
        minLength: 1
        description: "Template name"
      serviceName:
        type: string
        minLength: 1
        description: "Service Name"
      templateAttributes:
        type: array
        items:
          type: object
          properties:
            aEnd:
              type: string
              maxLength: 36
              pattern: '^[a-zA-Z0-9-]+\.[a-zA-Z0-9.-]*$'
            bEnd:
              type: string
              maxLength: 36
              pattern: '^[a-zA-Z0-9-]+\.[a-zA-Z0-9.-]*$'
            circuitId:
              type: string
              pattern: '^[a-zA-Z0-9]+$'
            status:
              type: string
              pattern: '^[a-zA-Z0-9-.]+$'  #Fix for DNE-5459
          required:
            - aEnd
            - status
        minItems: 1
        maxItems: 50
    required:
      - templateName
      - serviceName
      - templateAttributes

required:
  - chgtktNumber
