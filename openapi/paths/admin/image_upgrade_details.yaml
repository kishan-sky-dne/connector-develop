post:
  tags:
    - Upgrade
  summary: create image upgrade details
  description: Request to create image upgrade details
  security:
    - oAuth2ClientCredentials: [ connector:write ]
  x-openapi-router-controller: "connectors.webserver.admin.tasks.upgrade_details"
  operationId: image_upgrade_details
  requestBody:
    description: "Creates configuration for circuit test interface"
    required: True
    content:
      application/json:
        schema:
          $ref: "../../definitions/admin/imageUpgradeRequest.yaml"
  responses:
    '200':
      description: "Response while connector works on reading the software inventory details."
      content:
        application/json:
          schema:
            $ref: "../../definitions/admin/imageUpgradeResponse.yaml"

