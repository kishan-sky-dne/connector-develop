get:
  tags:
    - dcs
  summary: Retrieve all devices from DCS (filtered by regex)
  description: Get the hostname and rev of all devices filtered by the default or given regex
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.dcs.tasks.read"
  operationId: get_all_devices
  parameters:
    - name: 'regex'
      in: query
      required: false
      description: Regex to filter returned devices
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/dcs/response/getAllDevices.yaml'
      description: Expected response of dcs module for /getAllDevices call