required:
   - status
properties:
   status:
     type: string
     example: success
     enum :
       - success
       - failure
   errorCategory:
     type: "string"
     enum:
       - FAILED
       - RETRY
     example: "FAILED"
   errors:
     type: "array"
     items:
       type: "object"
       properties:
         code:
           type: "string"
           example: "ERR-008-012-1001"
         message:
           type: "string"
           example: "Failed to generate token"
   token:
     type: string
     example: hdjk1276jvsjy8353iuy