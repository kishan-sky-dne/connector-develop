post:
  tags:
    - nap
  summary: Submits failed circuits request to an external system for resubmission
  description: API is used to resubmit failed circuits request to an external system
  security:
    - oAuth2ClientCredentials: [ connector:write ]
  x-openapi-router-controller: "connectors.webserver.nap.tasks.update"
  operationId: update_nap_details
  requestBody:
    description: Required details to update NAP status
    content:
      application/json:
        schema:
          $ref: '../../definitions/nap/request/submitCircuits.yaml'
  responses:
    '200':
      description: Expected response of nap module for /submitCircuits.yaml call
      content:
        application/json:
          schema:
            $ref: '../../definitions/nap/response/submitCircuits.yaml'