        content:
          application/json:
            schema:
              properties:
                adminGroup:
                  enum:
                  - sky
                  example: sky
                  type: string
                deviceModel:
                  enum:
                  - NCS-5508
                  - N540-ACC-SYS
                  - N540X-ACC-SYS
                  - NCS-540
                  - NCS-540X
                  - NCS540L
                  - N540-24Q2C2DD-SYS
                  example: NCS-5508
                  type: string
                deviceType:
                  enum:
                  - Cisco
                  - CiscoNCS
                  example: Cisco
                  type: string
                deviceVendor:
                  enum:
                  - cisco
                  example: cisco
                  type: string
                hostname:
                  example: ta1.bllan.isp.sky.com
                  pattern: ^(?=.{1,36}$)((ta|ma).*(((\.isp)|(\.it)(\.bb))\.sky\.com))$
                  type: string
                os:
                  enum:
                  - ios-xr
                  example: ios-xr
                  type: string
                osVersion:
                  example: 7.0.2
                  pattern: ^(\d+((\.\d+){1,2})?)$
                  type: string
                owner:
                  enum:
                  - MD_IPCore
                  example: MD_IPCore
                  type: string
                status:
                  enum:
                  - preproduction
                  - development
                  - production
                  example: preproduction
                  type: string
                tacacsGroup:
                  enum:
                  - IP_OVN_CRS
                  example: IP_OVN_CRS
                  type: string
                tacacsSecret:
                  example: xfyg23sz6sf3rsa
                  pattern: ^(?! )[A-Za-z0-9 ]{16}(?<! )$
                  type: string
              required:
              - hostname
              - deviceVendor
              - deviceModel
              - adminGroup
              - owner
              - status
              - tacacsGroup
              - tacacsSecret
              - deviceType
        description: Required details to add device in dcs system
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errorCategory:
                    enum:
                    - FAILED
                    example: FAILED
                    type: string
                  errors:
                    items:
                      properties:
                        code:
                          example: ERR-003-999-4001
                          type: string
                        message:
                          example: Error message
                          type: string
                      type: object
                    type: array
                  status:
                    enum:
                    - SUCCESS
                    - FAILURE
                    example: SUCCESS|FAILURE
                    type: string
                required:
                - status
          description: Expected response from dcs system
      security:
      - oAuth2ClientCredentials:
        - connector:write
      summary: Add a device in dis system
      tags:
      - dcs
      x-openapi-router-controller: connectors.webserver.dcs.tasks.write
