put:
  tags:
    - inca
  summary: Update the New Switch request status to RFS (Ready For Service).
  description: Update the New Switch request status to Ready For Service (RFS).
  security:
    - oAuth2ClientCredentials: [connector:write]
  x-openapi-router-controller: "connectors.webserver.inca.tasks.update"
  operationId: update_inca_rfs_details
  parameters:
    - name: 'type'
      in: query
      required: true
      description: type of the service
      schema:
        type: string
        example: newMetroSwitch
        enum:
          - newMetroSwitch
  requestBody:
    description: Required details to update INCA rfs status
    content:
      'application/json':
        schema:
          $ref: '../../definitions/inca/request/updateIncaRfsDetails.yaml'
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/inca/response/updateIncaRfsDetails.yaml'
      description: Expected response of inca module for /updateIncaRfsDetails call