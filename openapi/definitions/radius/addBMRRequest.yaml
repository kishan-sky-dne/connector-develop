type: object
properties:
  ruleIpv6Prefix: 
    type: string
    example: 2a0e:418::/32
    description: ip address info to be retrieved.
    minLength: 1
  ruleIpv4Prefix: 
    type: string
    example: 101.56.0.0/20
    description: ip address info to be retrieved.
    minLength: 1
  psidLength: 
    type: integer
    example: 3
    description: psidlength
  psidOffset: 
    type: integer
    example: 6
    description: psidoffset
  eaLength: 
    type: integer
    example: 16
    description: ealength
required:
  - ruleIpv6Prefix
  - ruleIpv4Prefix
  - psidLength
  - psidOffset
  - eaLength