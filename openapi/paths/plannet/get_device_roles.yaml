get:
  tags:
    - plannet
  summary: Retrieve device roles from plannet
  description: Get meta data of device roles from plannet connector plannet
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.plannet.tasks.read"
  operationId: get_device_roles
  parameters:
    - name: 'id'
      in: query
      required: false
      description: Get device role details based on the id value provided
      example: 3
      schema:
        type: integer
    - name: 'name'
      in: query
      required: false
      description: Get device role details based on name value
      schema:
        type: string
        example: m_agg
    - name: 'description'
      in: query
      required: false
      description: Get device role details based on description value
      schema:
        type: string
        example: Metro Aggregation Router
    - name: 'color'
      in: query
      required: false
      description: Get device role details based on color value
      schema:
        type: string
    - name: 'filter'
      in: query
      required: false
      description: Get circuit types details based on filter value
      schema:
        type: string
    - name: 'limit'
      in: query
      required: false
      description: limit the number of response
      example: 100
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    - name: 'offset'
      in: query
      required: false
      description: skip the number of response from top
      example: 0
      schema:
        type: integer
        default: 0
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/plannet/response/get_device_roles.yaml'
      description: Expected response of plannet for /get_device_roles call