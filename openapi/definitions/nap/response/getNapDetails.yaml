type: object
properties:
  status:
    type: string
    example: "SUCCESS"
    enum:
      - "SUCCESS"
      - "FAIL"
      - "PARTIAL-SUCCESS"
  response:
    type: array
    items:
      type: object
      properties:
        failure:
          type: object
          properties:
            failureTimestamp:
              type: string
              example: "2024-09-04T07:51:35.936261Z"
            rawFailureContext:
              type: string
              example: "Nap service order 'c21e622f-006e-4998-af96-eaab3277e602' failed: Code [112001], Reason [Unrecognised error]"
        request:
          type: object
          properties:
            directoryNumber:
              type: object
              properties:
                existingNumber:
                  type: string
                  example: "+3536840735"
            orderReference:
              type: string
              example: "171300329"
            originalTimestamp:
              type: string
              example: "2024-09-04T07:51:29.409897Z"
            type:
              type: string
              example: "NETWORK_PROVISION"
