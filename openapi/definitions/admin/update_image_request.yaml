type: object
required:
  - osStatus
properties:
  osStatus:
    type: string
    example: "Deprecated"
    enum: ["Deprecated", "Current", "Under_test", "Decommissioned", "Target"]
    minLength: 1
    maxLength: 50
  Comments:
    type: string
    example: Upgrade is due to certain reason...
    minLength: 1
    maxLength: 2000