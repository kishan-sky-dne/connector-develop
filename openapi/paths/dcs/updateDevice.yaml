patch:
  tags:
    - dcs
  summary: Update device details in dcs system
  description: requests to update device in dcs system
  security:
    - oAuth2ClientCredentials: [connector:write]
  x-openapi-router-controller: "connectors.webserver.dcs.tasks.update"
  operationId: update_device
  parameters:
    - name: "hostname"
      in: path
      required: true
      description: device name
      schema:
        type: string
        example: "ta1.bllan.isp.sky.com"
  requestBody:
    description: Required details to update device in dcs system
    content:
      application/json:
        schema:
          $ref: '../../definitions/dcs/request/updateDeviceRequest.yaml'
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/dcs/response/updateDeviceResponse.yaml'
      description: Expected response from dcs system