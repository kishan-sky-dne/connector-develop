---
# Connectors Deployment for CKS (Template)
# Variables will be substituted by CI/CD pipeline using envsubst

apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectors
  namespace: ${NAMESPACE}
  labels:
    app: connectors
    version: v1
    environment: ${ENVIRONMENT}
    managed-by: concourse
spec:
  replicas: ${REPLICAS}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: connectors
      version: v1
  template:
    metadata:
      labels:
        app: connectors
        version: v1
        environment: ${ENVIRONMENT}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      # Use dedicated ServiceAccount (NOT default)
      serviceAccountName: app-sa
      
      # Security Context at Pod Level (CKS REQUIRED)
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault
      
      terminationGracePeriodSeconds: 300
      
      imagePullSecrets:
        - name: registry-credentials
      
      containers:
        - name: connectors
          image: ${IMAGE_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          imagePullPolicy: Always
          
          # Container-level security context (CKS REQUIRED)
          securityContext:
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          
          # Environment from ConfigMap
          envFrom:
            - configMapRef:
                name: connectors-config
                optional: false
          
          # Secrets as environment variables
          env:
            - name: CONNECTORS_OAUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: oauth_username
            - name: CONNECTORS_OAUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: oauth_password
            - name: CONNECTORS_SKY_VAULT_APP_ID
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: sky_vault_app_id
            - name: CONNECTORS_SKY_VAULT_CDN_RS_SAFE
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: sky_vault_cdn_rs_safe
            - name: CONNECTORS_CAUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: cauth_username
            - name: CONNECTORS_CAUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: cauth_password
            - name: CONNECTORS_AD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: ad_username
            - name: CONNECTORS_AD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: ad_password
            - name: CONNECTORS_ITSM_SUBSCRIPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: itsm_subscription_key
            - name: CONNECTORS_PLANNET_USERNAME
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: plannet_username
            - name: CONNECTORS_PLANNET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: plannet_password
            - name: CONNECTORS_INCA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: inca_username
            - name: CONNECTORS_INCA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: inca_password
            - name: CONNECTORS_INCA_NEXA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: nexa_username
            - name: CONNECTORS_INCA_NEXA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: nexa_password
            - name: CONNECTORS_RSA_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: rsa_private_key
            - name: CONNECTORS_RSA_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: connectors-secrets
                  key: rsa_public_key
          
          # Resource requests and limits
          resources:
            requests:
              cpu: "${CPU_REQUEST}"
              memory: "${MEMORY_REQUEST}"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "${CPU_LIMIT}"
              memory: "${MEMORY_LIMIT}"
              ephemeral-storage: "2Gi"
          
          
          # Probes
          livenessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          startupProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: 5000
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "echo Received SIGTERM > /app/maintenance/shutdown"]
      
     
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - connectors
                topologyKey: kubernetes.io/hostname
      
      dnsPolicy: ClusterFirst
      restartPolicy: Always

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: connectors
  namespace: ${NAMESPACE}
  labels:
    app: connectors
    environment: ${ENVIRONMENT}
spec:
  type: ClusterIP
  selector:
    app: connectors
    version: v1
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: connectors-pdb
  namespace: ${NAMESPACE}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: connectors
      version: v1

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: connectors-hpa
  namespace: ${NAMESPACE}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: connectors
  minReplicas: ${HPA_MIN_REPLICAS}
  maxReplicas: ${HPA_MAX_REPLICAS}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
