get:
  tags:
    - plannet
  summary: Retrieve ci details recursively from plannet
  description: Get ci details recursively from plannet connector plannet
  security:
    - oAuth2ClientCredentials: [connector:read]
  x-openapi-router-controller: "connectors.webserver.plannet.tasks.read"
  operationId: get_cis_details
  parameters:
    - name: 'host'
      in: query
      required: true
      description: Hostname of the device with domain
      schema:
        minLength: 1
        pattern: ^[a-zA-Z0-9-]+\.[a-zA-Z0-9.-]*\.(it\.bb|isp)\.sky\.com$
        type: string
        example: "ma0.wwbarn.isp.sky.com"
    - name: '_include'
      in: query
      required: False
      description: fetch ne, circuits based on values passed
      schema:
        type: array
        items:
          type: string
          minLength: 1
          enum:
            - nes
            - circuits
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '../../definitions/plannet/response/get_nes_details.yaml'
      description: Expected response of plannet for /getNesDetails call